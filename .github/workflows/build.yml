name: Build and Test pg_cardano

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu, archlinux, rockylinux]
    container:
      image: ${{ matrix.os == 'archlinux' && 'archlinux:latest' || matrix.os == 'rockylinux' && 'rockylinux:8' || 'ubuntu:latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Debian-based)
        if: matrix.os == 'ubuntu'
        run: |
          apt update
          apt install -y libclang-dev clang git curl build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config

      - name: Install dependencies (Arch-based)
        if: matrix.os == 'archlinux'
        run: |
          pacman -Syu --noconfirm clang git curl base-devel readline zlib flex bison libxml2 libxslt openssl ccache pkgconf

      - name: Install dependencies (RHEL-based)
        if: matrix.os == 'rockylinux'
        run: |
          yum makecache
          yum install -y clang clang-devel git curl bison-devel readline-devel zlib-devel openssl-devel wget ccache && yum groupinstall -y 'Development Tools'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV

      - name: Clone pg_cardano repository
        run: |
          git clone https://github.com/cardano-community/pg_cardano.git
          cd pg_cardano

      - name: Install specific version of cargo-pgrx
        run: |
          cargo install --version 0.12.9 cargo-pgrx

      - name: Initialize cargo-pgrx
        run: |
          cargo pgrx init

      - name: Build distribution
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Run tests
        run: |
          cargo test --package pg_cardano --lib tests

      - name: Create release artifact
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh
          echo "VERSION=$(grep '^version =' Cargo.toml | cut -d '\"' -f 2)" >> $GITHUB_ENV

      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: pg_cardano_${{ matrix.os }}_x86_64_v${{ env.VERSION }}
          path: ./releases/*.tar.gz

      - name: Create GitHub Release (if not exists)
        run: |
          gh release create ${{ env.VERSION }} \
            --title "Release ${{ env.VERSION }}" \
            --notes-file release_notes.md \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact to GitHub Release
        run: |
          gh release upload ${{ env.VERSION }} ./releases/*.tar.gz --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
