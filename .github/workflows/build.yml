name: Build and Test pg_cardano

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        os: [debian, arch, rhel, macos-x86_64, macos-arm64]
        include:
          - os: debian
            image: debian:latest
            runner: ubuntu-latest
          - os: arch
            image: archlinux:latest
            runner: ubuntu-latest
          - os: rhel
            image: almalinux:8
            runner: ubuntu-latest
          - os: macos-x86_64
            runner: macos-latest
          - os: macos-arm64
            runner: macos-latest
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          case "${{ matrix.os }}" in
            debian)
              apt update && apt install -y libclang-dev clang git curl build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config
              ;;
            arch)
              pacman -Syu --noconfirm clang git curl base-devel readline zlib flex bison libxml2 libxslt openssl ccache pkgconf
              ;;
            rhel)
              dnf makecache && dnf install -y epel-release && dnf makecache
              dnf install -y clang clang-devel git curl bison readline-devel zlib-devel openssl-devel wget ccache libicu-devel && dnf groupinstall -y 'Development Tools'
              ;;
            macos-*)
              brew install llvm git curl readline bison flex zlib openssl ccache icu4c pkg-config gettext libiconv
              brew link icu4c --force
              export LDFLAGS="-L$(brew --prefix icu4c)/lib"
              export CPPFLAGS="-I$(brew --prefix icu4c)/include"
              export PKG_CONFIG_PATH="$(brew --prefix)/opt/icu4c/lib/pkgconfig"
              export CMAKE_PREFIX_PATH=/usr/local/opt/icu4c
              ;;
          esac

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV

      - name: Clone pg_cardano repository
        run: |
          git clone https://github.com/cardano-community/pg_cardano.git
          cd pg_cardano

      - name: Install specific version of cargo-pgrx
        run: |
          cargo install --version 0.12.9 cargo-pgrx

      - name: Initialize cargo-pgrx
        run: |
          cargo pgrx init

      - name: Build distribution
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Run tests
        run: |
          if [[ "${{ matrix.os }}" == "rhel" ]]; then
            export TMPDIR=/tmp
            cargo test --package pg_cardano --lib tests -- --test-threads=1 --nocapture
          else
            cargo test --package pg_cardano --lib tests
          fi

      - name: Create release artifact
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh
          echo "VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)" >> $GITHUB_ENV

      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: pg_cardano_${{ matrix.os }}_x86_64_v${{ env.VERSION }}
          path: ./releases/*.tar.gz
