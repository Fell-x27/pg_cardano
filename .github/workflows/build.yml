name: Build and Test pg_cardano

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        os: [linux, macos-x86_64, macos-arm64]
        include:
          - os: linux
            runner: ubuntu-latest
          - os: macos-x86_64
            runner: macos-latest
          - os: macos-arm64
            runner: macos-latest
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          case "${{ matrix.os }}" in
            linux)
              sudo apt update && sudo apt install -y libclang-dev clang curl build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config
              ;;
            macos-*)
              brew install llvm curl readline bison flex zlib openssl ccache icu4c pkg-config gettext libiconv
              brew link icu4c --force
              export LDFLAGS="-L$(brew --prefix icu4c)/lib"
              export CPPFLAGS="-I$(brew --prefix icu4c)/include"
              export PKG_CONFIG_PATH="$(brew --prefix)/opt/icu4c/lib/pkgconfig"
              export CMAKE_PREFIX_PATH=/usr/local/opt/icu4c
              ;;
          esac

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV

      - name: Install specific version of cargo-pgrx
        run: |
          cargo install --version 0.12.9 cargo-pgrx

      - name: Initialize cargo-pgrx
        run: |
          cargo pgrx init

      - name: Build distribution
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Run tests
        run: |
            cargo test --package pg_cardano --lib tests
      
      - name: Create release artifact
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh
          echo "VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)" >> $GITHUB_ENV

      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: pg_cardano_${{ matrix.os }}_x86_64_v${{ env.VERSION }}
          path: ./releases/*.tar.gz
