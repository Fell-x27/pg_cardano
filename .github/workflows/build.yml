name: Build and Test pg_cardano

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: Build and Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        arch: [x86_64, aarch64]
    env:
      CARGO_BUILD_TARGET: ${{ matrix.arch }}-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt update
          sudo apt install -y libclang-dev clang git curl build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config

      - name: Fix containerd conflict (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt remove -y containerd.io || true
          sudo apt-mark unhold containerd || true
          sudo apt remove -y containerd || true

      - name: Install Docker (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt update
          sudo apt install -y ca-certificates curl gnupg
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo tee /etc/apt/keyrings/docker.asc > /dev/null
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt update
          sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          sudo usermod -aG docker $USER

      - name: Install Rust (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Rust target (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          rustup target add $CARGO_BUILD_TARGET

      - name: Build in Docker for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          docker run --rm --platform=linux/arm64 \
            -v "$(pwd)":/workspace \
            -w /workspace \
            rust:latest /bin/bash -c " \
              apt update && apt install -y libclang-dev clang git curl build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
              source $HOME/.cargo/env && \
              cargo install cargo-pgrx && \
              cargo pgrx init && \
              cargo pgrx package --target aarch64-unknown-linux-gnu && \
              chmod +x ./scripts/build.sh && \
              ./scripts/build.sh && \
              chmod +x ./scripts/release.sh && \
              ./scripts/release.sh"

      - name: Build and Test (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          cargo install cargo-pgrx
          cargo pgrx init
          cargo pgrx package
          cargo test --package pg_cardano --lib
          chmod +x ./scripts/build.sh
          ./scripts/build.sh
          chmod +x ./scripts/release.sh
          ./scripts/release.sh

      - name: Extract version from Cargo.toml
        id: get_version
        run: |
          echo "VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)" >> $GITHUB_ENV

      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: pg_cardano_linux_${{ matrix.arch }}_v${{ env.VERSION }}
          path: ./dist/*
