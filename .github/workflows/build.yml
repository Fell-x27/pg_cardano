name: Build and Test pg_cardano

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libclang-dev clang git curl build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "source \"$HOME/.cargo/env\"" >> $GITHUB_ENV

      - name: Ensure Cargo.lock exists
        run: |
          if [ ! -f Cargo.lock ]; then cargo generate-lockfile; fi

      - name: Fetch dependencies and build
        run: |
          source "$HOME/.cargo/env"
          cargo fetch
          cargo build --locked --release --workspace

      - name: Set up PGRX environment
        run: |
          echo "PGRX_HOME=$HOME/.pgrx" >> $GITHUB_ENV
          mkdir -p $HOME/.pgrx

      - name: Initialize cargo-pgrx
        run: |
          source "$HOME/.cargo/env"
          cargo pgrx init

      - name: Verify PGRX installation
        run: |
          ls -la $HOME/.pgrx

      - name: Build extension
        run: |
          source "$HOME/.cargo/env"
          cargo pgrx package

      - name: Run tests
        run: |
          source "$HOME/.cargo/env"
          cargo test --package pg_cardano --lib

      - name: Build distribution
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Create release artifact
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh

      - name: Extract version from Cargo.toml
        id: get_version
        run: |
          echo "VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)" >> $GITHUB_ENV

      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: pg_cardano_linux_x86_64_v${{ env.VERSION }}
          path: ./dist/*
